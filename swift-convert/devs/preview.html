<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>SwiftConvert Logo Preview</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F6F7F4;margin:0;padding:40px;color:#171717}
h1{font-size:20px;margin-bottom:24px}
.card{background:#fff;border:1px solid #E5E5E5;border-radius:12px;padding:28px;margin-bottom:16px;display:flex;align-items:center;gap:32px}
.card.dark{background:#0A0A0A;border-color:#262626}
.label{font-size:12px;color:#737373;width:180px;flex-shrink:0;font-family:monospace}
.card.dark .label{color:#8A8F87}
.sizes{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
</style></head><body>
<h1>SwiftConvert — Logo System</h1>
<div class="card"><span class="label">1 · favicon mark<br>32 / 16 px</span><div class="sizes">
<img src="1-favicon-mark.svg" width="64" height="64"><img src="1-favicon-mark.svg" width="32" height="32"><img src="1-favicon-mark.svg" width="16" height="16"></div></div>
<div class="card"><span class="label">2 · horizontal navbar</span><img src="2-horizontal-navbar.svg" height="48"></div>
<div class="card"><span class="label">3 · app icon 512<br>PWA / store</span><div class="sizes">
<img src="3-app-icon-512.svg" width="128" height="128"><img src="3-app-icon-512.svg" width="64" height="64"><img src="3-app-icon-512.svg" width="40" height="40"></div></div>
<div class="card"><span class="label">4 · monochrome<br>currentColor</span><img src="4-monochrome.svg" height="48"></div>
<div class="card dark"><span class="label">5 · dark mode</span><img src="5-dark-mode.svg" height="48"></div>
</body></html>
